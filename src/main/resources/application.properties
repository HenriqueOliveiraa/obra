spring.application.name=obra

# Forca UTF-8 no corpo das requisicoes (senao acentos de formularios HTML chegam corrompidos)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force-request=true

# PostgreSQL (sobe com "docker compose up -d" na raiz do projeto)
spring.datasource.url=jdbc:postgresql://localhost:5433/obradb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=obra
spring.datasource.password=obra

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
