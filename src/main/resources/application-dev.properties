# PostgreSQL local (sobe com "docker compose up -d" na raiz do projeto)
spring.datasource.url=jdbc:postgresql://localhost:5433/obradb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=obra
spring.datasource.password=obra

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# CORS liberado pro Angular local
app.cors.allowed-origin=http://localhost:4200
