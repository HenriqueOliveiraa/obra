# Todos os valores vem de variaveis de ambiente do servidor de producao - nada hardcoded aqui.
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Adia a criacao dos beans pra primeira requisicao - faz a porta abrir mais cedo
# e evita o Render matar o container por timeout de deploy
spring.main.lazy-initialization=true
spring.data.jpa.repositories.bootstrap-mode=lazy

# Render injeta a porta do servico na variavel PORT
server.port=${PORT:8080}

# CORS liberado so pro dominio real do frontend em producao
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN}

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# Usuarios criados automaticamente na primeira execucao
app.seed.usuarios[0].nome=${SEED_USER0_NOME}
app.seed.usuarios[0].email=${SEED_USER0_EMAIL}
app.seed.usuarios[0].senha=${SEED_USER0_SENHA}
app.seed.usuarios[1].nome=${SEED_USER1_NOME}
app.seed.usuarios[1].email=${SEED_USER1_EMAIL}
app.seed.usuarios[1].senha=${SEED_USER1_SENHA}
